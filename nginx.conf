# /etc/nginx/sites-available/metricool-mcp
#
# Reverse proxy for the Metricool MCP server.
# Accessible at https://mcp.metricool.ai
#
# Prerequisites:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d mcp.metricool.ai
#
# After certbot runs it will populate the ssl_certificate lines automatically.
# The server block below is the template before certbot modifies it.

server {
    listen 80;
    server_name mcp.metricool.ai;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name mcp.metricool.ai;

    # --- TLS (filled in by certbot) ---
    ssl_certificate     /etc/letsencrypt/live/mcp.metricool.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp.metricool.ai/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header X-Frame-Options           DENY                                  always;

    # --- MCP endpoint ---
    # The MCP Python SDK exposes the Streamable HTTP transport at /mcp
    location /mcp {
        proxy_pass         http://127.0.0.1:8000/mcp;
        proxy_http_version 1.1;

        # Pass original headers through
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep the Authorization header intact (needed for per-user API keys)
        proxy_pass_header Authorization;

        # SSE / long-polling support
        proxy_set_header   Connection      "";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering    off;
        chunked_transfer_encoding on;
    }

    # --- OAuth discovery endpoints (required for MCP OAuth flow) ---
    location /.well-known/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Health check endpoint (optional) ---
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
    }

    # --- Favicon ---
    location = /favicon.ico {
        alias /opt/metricool-mcp/favicon.ico;
        access_log off;
        log_not_found off;
    }

    # Block everything else
    location / {
        return 404;
    }
}
